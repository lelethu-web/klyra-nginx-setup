name: Deploy Nginx App to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # Set up Python for Ansible
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Install Ansible
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      # Add SSH key
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/klyra-nginx-key
          chmod 600 ~/.ssh/klyra-nginx-key
          echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config

      # Run Ansible playbook
      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventory/azure_vm.ini \
          ansible/playbooks/deploy.yml \
          --private-key ~/.ssh/klyra-nginx-key -u azureuser
          